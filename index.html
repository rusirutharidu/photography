<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Photography | Portfolio</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            text-align: center; 
            background-color: #f4f4f4; 
            
            /* Logo Background Settings */
            background-image: linear-gradient(rgba(244, 244, 244, 0.88), rgba(244, 244, 244, 0.88)), url('logo.jpg');

            right: 25px;
            background-color: #25d366;

            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 2px 4px 15px rgba(0,0,0,0.3);
            z-index: 100;
            display: flex;
            align-items: center;
        }
        footer { background: #222; color: #888; padding: 15px; margin-top: 40px; font-size: 0.9rem; }
